services:
  backend:
    build: ./backend
    container_name: portal-backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=portal
      - DB_USER=admin
      - DB_PASSWORD=secretpassword
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: portal-frontend
    ports:
      - "80:80"
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: portal-db
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: